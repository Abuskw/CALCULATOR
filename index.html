<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainView</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="app-header">
    <div class="logo-container">
        <div class="logo-icon"></div> 
        <h1>ChainView</h1>
    </div>
    <p class="tagline">Institutional Flow & Smart Money Tracker</p>
</header>

<main>

    <div id="inputSection" class="card">
        <label>Wallet Address</label>
        <input type="text" id="walletAddress" placeholder="0x...">

        <div class="network-container">
            <label>Select Network</label>
            <select id="chainSelect">
                <option value="eth">Ethereum</option>
                <option value="bsc">BSC</option>
                <option value="polygon">Polygon</option>
            </select>
        </div>

        <button id="checkWallet">Check Wallet</button>
        <button id="exportCSV">Export CSV</button>
    </div>

    <div id="home" class="tabContent active">
        <div class="card">
            <h2>Total Portfolio Value</h2>
            <p id="totalBalance">$0.00</p>
        </div>
    </div>

    <div id="tokens" class="tabContent">
        <div class="card">
            <h2>Tokens</h2>
            <ul id="tokenList"></ul>
        </div>
    </div>

    <div id="nfts" class="tabContent">
        <div class="card">
            <h2>NFTs</h2>
            <div id="nftGallery" class="nftGallery"></div>
        </div>
    </div>

    <div id="activity" class="tabContent">
        <div class="card">
            <h2>Transactions</h2>
            <ul id="txList"></ul>
        </div>
    </div>

</main>

<div class="tabs">
    <button class="tabButton active" data-tab="home">Home</button>
    <button class="tabButton" data-tab="tokens">Tokens</button>
    <button class="tabButton" data-tab="nfts">NFTs</button>
    <button class="tabButton" data-tab="activity">Activity</button>
</div>

<script src="app.js"></script>
</body>
                                                 </html>
